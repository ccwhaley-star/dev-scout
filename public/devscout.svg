<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Chip body -->
  <rect x="6" y="6" width="20" height="20" rx="3" fill="url(#g)"/>
  <!-- Pins - top -->
  <line x1="11" y1="3" x2="11" y2="6" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="3" x2="16" y2="6" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="3" x2="21" y2="6" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pins - bottom -->
  <line x1="11" y1="26" x2="11" y2="29" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="16" y2="29" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="26" x2="21" y2="29" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pins - left -->
  <line x1="3" y1="11" x2="6" y2="11" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="3" y1="16" x2="6" y2="16" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="3" y1="21" x2="6" y2="21" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pins - right -->
  <line x1="26" y1="11" x2="29" y2="11" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="26" y1="16" x2="29" y2="16" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="26" y1="21" x2="29" y2="21" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Magnifying glass -->
  <circle cx="14.5" cy="14.5" r="4" fill="none" stroke="white" stroke-width="2"/>
  <line x1="17.5" y1="17.5" x2="21.5" y2="21.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
