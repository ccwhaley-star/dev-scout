<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- CPU/Chip body -->
  <rect x="20" y="20" width="70" height="70" rx="10" fill="url(#chipGrad)" stroke="#4f46e5" stroke-width="3"/>
  <!-- Chip pins - top -->
  <rect x="32" y="12" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="42" y="12" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="52" y="12" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="62" y="12" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="72" y="12" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <!-- Chip pins - bottom -->
  <rect x="32" y="86" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="42" y="86" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="52" y="86" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="62" y="86" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <rect x="72" y="86" width="5" height="12" rx="2" fill="url(#pinGrad)"/>
  <!-- Chip pins - left -->
  <rect x="8" y="32" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="8" y="42" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="8" y="52" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="8" y="62" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="8" y="72" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <!-- Chip pins - right -->
  <rect x="90" y="32" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="90" y="42" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="90" y="52" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="90" y="62" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <rect x="90" y="72" width="12" height="5" rx="2" fill="url(#pinGrad)"/>
  <!-- Magnifying glass circle -->
  <circle cx="78" cy="58" r="22" fill="url(#lensGrad)" stroke="#fff" stroke-width="4"/>
  <circle cx="78" cy="58" r="22" fill="none" stroke="#4f46e5" stroke-width="3"/>
  <!-- Lens highlight -->
  <ellipse cx="72" cy="50" rx="6" ry="4" fill="#fff" opacity="0.5" transform="rotate(-20 72 50)"/>
  <!-- Magnifying glass handle -->
  <rect x="94" y="74" width="22" height="10" rx="5" fill="#4338ca" transform="rotate(45 94 74)"/>
  <defs>
    <linearGradient id="chipGrad" x1="20" y1="20" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="56" y1="36" x2="100" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
</svg>